name: Contribution gate

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  evidence:
    name: Evidence contract
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout trusted base / Obter base confiável
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch untrusted objects without checkout / Obter objetos sem executar código
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: git fetch --no-tags origin "pull/${PR_NUMBER}/head:refs/remotes/origin/pr-head"

      - name: Validate evidence / Validar evidências
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python workspace_tools/reconstruction_pipeline/validate_contribution.py \
            --base "${BASE_SHA}" \
            --head "${HEAD_SHA}"
